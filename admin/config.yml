# ================================
# ZEAMOR CMS Configuration (Decap CMS)
# Manages js/site.config.json
# ================================

backend:
  name: github
  repo: szyfjinxi-gif/zeamor-website
  branch: main
  # ⚠️ base_url: Replace with your Worker URL after deployment
  # e.g. https://zeamor-oauth.yourname.workers.dev
  # Leave commented until Worker is deployed + secrets are set
  # base_url: https://zeamor-oauth.REPLACE_ME.workers.dev

publish_mode: editorial_workflow

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "Edit All Site Data"
        name: "site_data"
        file: "js/site.config.json"
        fields:
          - label: "Brand Information"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Brand Name", name: "name", widget: "string", default: "ZEAMOR" }
              - { label: "Email", name: "email", widget: "string", default: "zeamor@zeamor.com" }
              - { label: "Phone", name: "phone", widget: "string", default: "+86 157 0017 0089" }
              - { label: "WhatsApp", name: "whatsapp", widget: "string", default: "+86 157 0017 0089" }
              - { label: "Founded Year", name: "foundedYear", widget: "number", default: 2009 }
          - label: "Stats"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Years Experience", name: "yearsExperience", widget: "string", default: "20+" }
              - { label: "Years Export", name: "yearsExport", widget: "string", default: "15+" }
              - { label: "Happy Clients", name: "happyClients", widget: "string", default: "1000+" }
          - label: "Featured Products (Homepage)"
            name: "featuredProducts"
            widget: "list"
            summary: "{{fields.title.en}}"
            fields:
              - { label: "Image", name: "img", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - label: "Title"
                name: "title"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Chinese", name: "zh", widget: "string" }
                  - { label: "Japanese", name: "ja", widget: "string" }
              - label: "Description"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "text" }
                  - { label: "Chinese", name: "zh", widget: "text" }
                  - { label: "Japanese", name: "ja", widget: "text" }
          - label: "Product Categories"
            name: "productCategories"
            widget: "list"
            summary: "{{fields.title.en}}"
            fields:
              - label: "Category Tag"
                name: "tag"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Chinese", name: "zh", widget: "string" }
                  - { label: "Japanese", name: "ja", widget: "string" }
              - label: "Category Title"
                name: "title"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Chinese", name: "zh", widget: "string" }
                  - { label: "Japanese", name: "ja", widget: "string" }
              - label: "Products"
                name: "items"
                widget: "list"
                summary: "{{fields.title.en}}"
                fields:
                  - { label: "Product Image", name: "img", widget: "image" }
                  - label: "Product Title"
                    name: "title"
                    widget: "object"
                    fields:
                      - { label: "English", name: "en", widget: "string" }
                      - { label: "Chinese", name: "zh", widget: "string" }
                      - { label: "Japanese", name: "ja", widget: "string" }
                  - label: "Product Description"
                    name: "desc"
                    widget: "object"
                    fields:
                      - { label: "English", name: "en", widget: "text" }
                      - { label: "Chinese", name: "zh", widget: "text" }
                      - { label: "Japanese", name: "ja", widget: "text" }
          - label: "Model Gallery (Homepage)"
            name: "modelGallery"
            widget: "list"
            fields:
              - { label: "Image", name: "img", widget: "image" }
